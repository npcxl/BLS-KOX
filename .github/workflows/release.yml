name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bls-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bls-server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bls-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bls-admin/package-lock.json
      - run: npm ci
      - run: npm run tsc
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t bls-kox-server:${{ github.ref_name }} ./bls-server
      - run: docker build -t bls-kox-admin:${{ github.ref_name }} ./bls-admin
      - run: docker compose config
        env:
          DB_PASSWORD: ci_test_password_placeholder
          REDIS_PASSWORD: ci_test_password_placeholder
          JWT_SECRET: ci_test_jwt_secret_at_least_32_chars_long
