name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_USER: root
  DB_PASSWORD: ci_test_pw
  DB_NAME: bls_test
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379
  REDIS_PASSWORD: ci_test_pw
  JWT_SECRET: ci_test_jwt_secret_at_least_32_chars_long
  OTEL_TRACES_ENABLED: false

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bls-server
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_pw
          MYSQL_DATABASE: bls_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bls-server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          CI: true
      - run: npm run build

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bls-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bls-admin/package-lock.json
      - run: npm ci
      - run: npm run tsc
      - run: npm test
        env:
          CI: true
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t bls-kox-server:test ./bls-server
      - run: docker build -t bls-kox-admin:test ./bls-admin
      - run: docker compose config
        env:
          DB_PASSWORD: ci_test_password_placeholder
          REDIS_PASSWORD: ci_test_password_placeholder
          JWT_SECRET: ci_test_jwt_secret_at_least_32_chars_long
