name: Bug Report
description: 提交 Bug 报告
labels: [bug]
body:
  - type: textarea
    attributes:
      label: 问题描述
      description: 清晰描述遇到的问题
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤
      description: 逐步描述如何复现
    validations:
      required: true
  - type: textarea
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: input
    attributes:
      label: Node.js 版本
      placeholder: "22.14.0"
  - type: input
    attributes:
      label: MySQL 版本
      placeholder: "8.0"
  - type: input
    attributes:
      label: 浏览器
      placeholder: "Chrome 126"
  - type: textarea
    attributes:
      label: 相关日志
