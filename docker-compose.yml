# BLS-KOX 全栈部署
# 启动：docker compose up -d
# 前置：bls-server 先执行 npm run build（生成 dist/）

version: "3.8"

services:
  # ========== Nginx 反向代理 ==========
  bls-nginx:
    image: nginx:alpine
    container_name: bls-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bls-server
      - bls-admin
    networks:
      - bls-net

  # ========== 后端 Koa ==========
  bls-server:
    build: ./bls-server
    container_name: bls-server
    restart: unless-stopped
    expose:
      - "7001"  # 仅容器网络，不暴露公网
    environment:
      - NODE_ENV=production
      - APP_PORT=7001
      - TRUST_PROXY=true
      # 数据库
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_NAME=${DB_NAME:-bls}
      # Redis
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_ENABLED=true
      # JWT
      - JWT_SECRET=${JWT_SECRET:-}
      # CORS（生产必填）
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      # 防重放
      - REPLAY_ENABLED=true
      - API_SIGN_SECRET=${API_SIGN_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bls-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:7001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ========== 前端 Ant Design Pro ==========
  bls-admin:
    image: nginx:alpine
    container_name: bls-admin
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./bls-admin/dist:/usr/share/nginx/html:ro
      - ./bls-admin-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bls-net

  # ========== MySQL 8 ==========
  mysql:
    image: mysql:8.0
    container_name: bls-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-}
      - MYSQL_DATABASE=${DB_NAME:-bls}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./bls-server/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${DB_EXPOSE_PORT:-3306}:3306"  # 开发时暴露，生产删除此行
    networks:
      - bls-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: bls-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    networks:
      - bls-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql-data:
  redis-data:

networks:
  bls-net:
    driver: bridge
