# BLS-KOX 全栈部署
# 启动: docker compose --env-file .env.docker up -d --build

services:
  # ========== Nginx 反向代理 ==========
  bls-nginx:
    image: nginx:alpine
    container_name: bls-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
      # - "443:443"  # 本地开发不需要 HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ${NGINX_CERTS_DIR:-./certs}:/etc/nginx/certs:ro  # 本地开发不需要 SSL 证书
    depends_on:
      - bls-server
      - bls-admin
      - bls-ai-service
    networks:
      - bls-net

  # ========== 后端 Koa ==========
  bls-server:
    build:
      context: ./bls-server
    container_name: bls-server
    restart: unless-stopped
    expose:
      - "7001"
    environment:
      - NODE_ENV=production
      - APP_PORT=7001
      - TRUST_PROXY=true
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-bls}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - REDIS_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - REPLAY_ENABLED=true
      - API_SIGN_SECRET=${API_SIGN_SECRET:-}
      - EVENT_SERVICE_URL=${EVENT_SERVICE_URL:-}
      - INTERNAL_SECRET=${INTERNAL_SECRET:?INTERNAL_SECRET is required}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bls-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:7001/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ========== 事件服务 (Koa 微服务示范，可选启动) ==========
  bls-event-service:
    build:
      context: ./bls-event-service
    container_name: bls-event-service
    restart: unless-stopped
    profiles:
      - event
    expose:
      - "7101"
    environment:
      - NODE_ENV=production
      - APP_PORT=7101
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-bls}
      - INTERNAL_SECRET=${INTERNAL_SECRET:?INTERNAL_SECRET is required}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bls-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:7101/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ========== AI 服务 (Koa 微服务) ==========
  bls-ai-service:
    build:
      context: ./bls-ai-service
    container_name: bls-ai-service
    restart: unless-stopped
    expose:
      - "7201"
    environment:
      - NODE_ENV=production
      - APP_PORT=7201
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - AI_MODEL=${AI_MODEL:-qwen2.5:7b}
      - AI_MODEL_OPTIONS=${AI_MODEL_OPTIONS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - AI_BASE_URL=${AI_BASE_URL:-http://ollama:11434/v1}
      - BLS_SERVER_URL=http://bls-server:7001
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - INTERNAL_SECRET=${INTERNAL_SECRET:?INTERNAL_SECRET is required}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bls-net
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:7201/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ========== 后端 Java (可选，与 Koa 并存) ==========
  bls-java-server:
    build:
      context: ./bls-java-server
    container_name: bls-java-server
    restart: unless-stopped
    profiles:
      - java
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MYSQL_HOST=${DB_HOST:-mysql}
      - MYSQL_PORT=${DB_PORT:-3306}
      - MYSQL_USER=${DB_USER:-root}
      - MYSQL_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - MYSQL_DATABASE=${DB_NAME:-bls}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - API_SIGN_SECRET=${API_SIGN_SECRET:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bls-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:8080/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ========== 前端 ==========
  bls-admin:
    build:
      context: ./bls-admin
    container_name: bls-admin
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - bls-net

  # ========== MySQL 8 ==========
  mysql:
    image: mysql:8.0
    container_name: bls-mysql
    restart: unless-stopped
    command: --default-time-zone=+08:00 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - MYSQL_DATABASE=${DB_NAME:-bls}
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/Init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    expose:
      - "3306"
    networks:
      - bls-net
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${DB_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: bls-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        redis-server --appendonly yes;
      fi'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    networks:
      - bls-net
    healthcheck:
      test: [ "CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG; else redis-cli ping | grep PONG; fi" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ========== MinIO 对象存储 ==========
  minio:
    image: minio/minio:latest
    container_name: bls-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:?MINIO_USER is required}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:?MINIO_PASSWORD is required}
      - TZ=Asia/Shanghai
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - bls-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO 初始化：创建 bucket 并设置公开访问（用 minio 自带的 mc）
  minio-init:
    image: minio/minio:latest
    container_name: bls-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ${MINIO_USER:?MINIO_USER is required} ${MINIO_PASSWORD:?MINIO_PASSWORD is required}; mc mb --ignore-existing local/public-assets; mc mb --ignore-existing local/private-assets; mc anonymous set public local/public-assets; echo 'MinIO buckets initialized'; exit 0; "
    networks:
      - bls-net

  # ========== Ollama 本地大模型 ==========
  ollama:
    image: ollama/ollama:latest
    container_name: bls-ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - bls-net
    healthcheck:
      test: [ "CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Ollama 模型拉取（根据 AI_MODEL 环境变量下载对应模型）
  ollama-pull:
    image: ollama/ollama:latest
    container_name: bls-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: sh -c "ollama pull ${AI_MODEL:-qwen2.5:7b}"
    environment:
      - OLLAMA_HOST=ollama:11434
    networks:
      - bls-net

volumes:
  mysql-data:
  redis-data:
  ollama-data:
  minio-data:


networks:
  bls-net:
    driver: bridge
