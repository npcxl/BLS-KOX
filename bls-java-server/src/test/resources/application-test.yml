server:
  port: 8080

spring:
  application:
    name: bls-java-server
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;INIT=RUNSCRIPT FROM 'classpath:test-schema.sql'
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.bls.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: test-jwt-secret-key-that-is-at-least-32-chars-long
  access-token-expiration: 900
  refresh-token-expiration: 604800
  issuer: bls-kox

api:
  sign-secret: test-api-sign-secret

file:
  upload:
    max-size: 104857600
    allowed-extensions: jpg,jpeg,png,gif,webp,pdf,doc,docx,xls,xlsx,txt,csv,json,zip

minio:
  enabled: false

logging:
  level:
    com.bls.server: DEBUG
    org.springframework.security: INFO
