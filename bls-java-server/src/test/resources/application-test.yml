spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;INIT=RUNSCRIPT FROM 'classpath:test-schema.sql'
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

jwt.secret=test-jwt-secret-key-that-is-at-least-32-chars-long
jwt.access-token-expiration=900
jwt.refresh-token-expiration=604800

api.sign-secret=test-api-sign-secret

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

logging.level.com.bls.server=DEBUG
