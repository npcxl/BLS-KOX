# BLS-KOX Nginx 配置
# Browser → Nginx(80) → bls-admin(前端SPA) | bls-server(后端API)
#
# 切换后端: 将所有 proxy_pass http://bls_server; 改为 http://bls_java_server;
# 或者修改 bls_server upstream 的 server 指向 Java 服务。

server_tokens off;

# Docker 内置 DNS（变量化 proxy_pass 需要 resolver）
resolver 127.0.0.11 valid=10s;

# ========== 限流 Zone ==========
limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# ========== 上游 Koa 后端 ==========
upstream bls_server {
    server bls-server:7001 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ========== 上游 前端 Admin ==========
upstream bls_admin {
    server bls-admin:80 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ========== 上游 Java (可选，取消注释此处即可切换后端) ==========
# upstream bls_java_server {
#     server bls-java-server:8080 max_fails=3 fail_timeout=30s;
#     keepalive 64;
# }

server {
    listen 80;
    server_name _;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'";

    # 连接数限制
    limit_conn conn 20;

    # 基础代理
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ========== API 路由 → 后端 ==========

    # 登录独立限流
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 上传大文件
    location /api/system/storage/upload {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # 导出超时
    location /api/common/excel/export {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # AI 对话存储/列表 → bls-server（数据库操作不走微服务）
    location /api/ai/chat/conversations {
        set $main_upstream bls-server:7001;
        proxy_pass http://$main_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # AI 微服务路由（必须在通用 /api/ 之前匹配）
    location /api/ai/ {
        set $ai_upstream bls-ai-service:7201;
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://$ai_upstream;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 通用 API 路由
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://bls_server;
    }

    # AI WebSocket 流式（必须在通用 /ws/ 之前匹配）
    location /ws/ai {
        set $ai_upstream bls-ai-service:7201;
        proxy_pass http://$ai_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 360s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://bls_server;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # MinIO 公共桶代理（图片等静态文件）
    location /files/ {
        proxy_pass http://minio:9000/public-assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # ========== 前端 SPA → bls-admin ==========
    location / {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://bls_admin;
    }

    # 健康检查
    location /health {
        proxy_pass http://bls_server;
        access_log off;
    }

    # 禁止隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
