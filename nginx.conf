# BLS-KOX Nginx 配置
# 部署架构：Browser → Nginx(80/443) → Docker Network → Koa(7001)
#
# 安全要求：
#   - 可信代理链：Koa app.proxy=true + 本配置的 X-Forwarded-* Header
#   - 后端 7001 端口仅容器网络可访问，不暴露公网
#   - 所有限流、IP 审计依赖本配置传递真实客户端 IP

upstream bls_server {
    server bls-server:7001 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ========== HTTP → HTTPS 重定向（生产环境） ==========
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ========== HTTPS ==========
server {
    listen 443 ssl http2;
    server_name _;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # HTTPS 90 天内强制使用
    add_header Strict-Transport-Security "max-age=7776000; includeSubDomains" always;

    # SSL 证书（部署时替换为真实路径）
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ========== 可信代理 Header ==========
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # 客户端传入的 X-Request-Id / X-Trace-Id 透传
    proxy_set_header X-Request-Id      $http_x_request_id;
    proxy_set_header X-Trace-Id        $http_x_trace_id;

    # ========== 基础限流（Nginx 层第一道防线） ==========
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # 连接数限制
    limit_conn conn 20;

    # ========== 代理 ==========
    location / {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://bls_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 超时
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }

    # 登录接口独立限流
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://bls_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 上传接口：超时加大，禁用缓冲
    location /api/system/storage/upload {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://bls_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # 导出接口：超时加大
    location /api/common/excel/export {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://bls_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://bls_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # 健康检查（不记录日志）
    location /health {
        proxy_pass http://bls_server;
        access_log off;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
