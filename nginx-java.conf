# BLS-KOX Nginx 配置（Java 后端）
# Browser → Nginx(80) → bls-admin(前端SPA) | bls-java-server(后端Java API)
# 使用方式: docker compose 中 volumes 挂载改为 ./nginx-java.conf

server_tokens off;

# ========== 限流 Zone ==========
limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

# ========== 上游 Java 后端 ==========
upstream bls_server {
    server bls-java-server:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ========== 上游 前端 Admin ==========
upstream bls_admin {
    server bls-admin:80 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'";

    # 连接数限制
    limit_conn conn 20;

    # 基础代理
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ========== API 路由 → Java 后端 ==========

    # 登录独立限流
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 上传大文件
    location /api/system/storage/upload {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # 导出超时
    location /api/common/excel/export {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 通用 API 路由
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://bls_server;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://bls_server;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # MinIO 公共桶代理（图片等静态文件）
    location /files/ {
        proxy_pass http://minio:9000/public-assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    # ========== 前端 SPA → bls-admin ==========
    location / {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://bls_admin;
    }

    # 健康检查
    location /health {
        proxy_pass http://bls_server;
        access_log off;
    }

    # 禁止隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ========== HTTPS ==========
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (生产环境推荐启用)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'";

    # 连接数限制
    limit_conn conn 20;

    # 基础代理
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ========== API 路由 → Java 后端 ==========

    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /api/system/storage/upload {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    location /api/common/excel/export {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://bls_server;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /api/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://bls_server;
    }

    location /ws/ {
        proxy_pass http://bls_server;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    location /files/ {
        proxy_pass http://minio:9000/public-assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 100m;
    }

    location / {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://bls_admin;
    }

    location /health {
        proxy_pass http://bls_server;
        access_log off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
